services:
  smtp-proxy:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - DATABASE_URL=${DATABASE_URL:-postgres://localhost:5432/dummy}
      - SMTP_PROVIDERS=${SMTP_PROVIDERS}
      - API_KEYS=${API_KEYS}
      - MAX_ATTACHMENT_SIZE=${MAX_ATTACHMENT_SIZE:-10MB}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
